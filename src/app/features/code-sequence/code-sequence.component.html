<div class="code-sequence-container panel-container">
    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h2 class="main-content-title tx-24 mg-b-5">Code Type Sequence</h2>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="javascript:void(0)">Settings</a></li>
                <li class="breadcrumb-item active" aria-current="page">Code Type Sequence</li>
            </ol>
        </div>
    </div>

    <div class="content row row-sm">
        <div class="col-lg-12 col-md-12">
            <div class="card custom-card">
                <div class="card-body">
                    <h3 class="card-title">Add Sequence</h3>
                    <p class="card-description">Define the sequence range and cycling for the selected code type</p>

                    <app-alert *ngIf="successMessage" type="success" [message]="successMessage"></app-alert>
                    <app-alert *ngIf="errorMessage" type="error" [message]="errorMessage"></app-alert>

                    @if (isLoadingTypes) {
                    <div class="skeleton-wrap">
                        <div class="skeleton-field"></div>
                    </div>
                    } @else {
                    <form [formGroup]="seqForm" (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
                        <!-- Type and Name -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="codeTypeId" class="form-label">Code Type <span
                                        class="text-danger">*</span></label>
                                <select id="codeTypeId" class="form-control" formControlName="codeTypeId"
                                    [class.is-invalid]="codeTypeId?.invalid && codeTypeId?.touched">
                                    <option [ngValue]="null">— Select code type —</option>
                                    @for (ct of codeTypes; track ct.id) {
                                    <option [value]="ct.id">{{ ct.codeTypeCode }} — {{ ct.nameEn }}</option>
                                    }
                                </select>
                                <div class="error-text" *ngIf="codeTypeId?.invalid && codeTypeId?.touched">
                                    Code Type is required
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="sequenceName" class="form-label">Sequence Name <span
                                        class="text-danger">*</span></label>
                                <input id="sequenceName" type="text" class="form-control" formControlName="sequenceName"
                                    placeholder="e.g. Employee Seq"
                                    [class.is-invalid]="sequenceName?.invalid && sequenceName?.touched" />
                                <div class="error-text" *ngIf="sequenceName?.invalid && sequenceName?.touched">
                                    Sequence name is required
                                </div>
                            </div>
                        </div>

                        <!-- Numeric Range -->
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="startValue" class="form-label">Start With <span
                                        class="text-danger">*</span></label>
                                <input id="startValue" type="number" class="form-control" formControlName="startValue"
                                    [class.is-invalid]="startValue?.invalid && startValue?.touched" />
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="minValue" class="form-label">Min Value</label>
                                <input id="minValue" type="number" class="form-control" formControlName="minValue" />
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="maxValue" class="form-label">Max Value</label>
                                <input id="maxValue" type="number" class="form-control" formControlName="maxValue" />
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="cycling" class="form-label">Cycling Value</label>
                                <input id="cycling" type="number" class="form-control" formControlName="cycling"
                                    placeholder="Enter cycling value (e.g. 5)" />
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-primary-save btn-lg px-5" [disabled]="isSaving">
                                @if (isSaving) {
                                <span class="spinner-border spinner-border-sm me-1"></span>
                                Saving...
                                } @else {
                                Save & Continue to Generation
                                }
                            </button>
                        </div>
                    </form>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
